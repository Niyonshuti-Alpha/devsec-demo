{% extends 'alpha/base.html' %}
{% block content %}
<h2>Profile</h2>
<p>Hello, {{ user.username }}!</p>
<p>Email: {{ user.email }}</p>
<p>Bio: {{ user.userprofile.bio }}</p>
<p><a href="{% url 'update_profile' user.id %}">Update Bio</a></p>
<p><a href="{% url 'password_change' %}">Change Password</a></p>
{% endblock %}
