<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UAS Auth Service</title>
</head>
<body>
    <nav>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'protected_view' %}">Protected Area</a>
        {% if perms.alpha.can_view_dashboard %}
            <a href="{% url 'instructor_dashboard' %}">Instructor Dashboard</a>
        {% endif %}
        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout ({{ user.username }})</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
    <hr>
    <div>
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
